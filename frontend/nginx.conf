server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Increase max body size for large embedded HTML files (~33MB English)
    client_max_body_size 50m;

    # gzip — reduces 25MB HTML over the wire
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    # Note: text/html is gzipped by default

    # Security headers (complement <meta> tags inside the HTML)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Health probe (used by Docker healthcheck and load balancers)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # API proxy → backend service on Railway private network
    # Variable + resolver forces runtime DNS so nginx survives backend restarts.
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
    location /api/ {
        set $backend "benlaviclinic.railway.internal:8080";
        proxy_pass http://$backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # English subpath
    location /en/ {
        try_files $uri $uri/ /en/index.html;
    }

    # Hebrew (default)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for asset files (in case external assets are added later)
    location ~* \.(woff2|woff|ttf|jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
